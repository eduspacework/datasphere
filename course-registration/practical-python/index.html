<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Free Practical Python Course — Registration</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:0;padding:24px;background:#f6f8fa}
    .container{max-width:720px;margin:0 auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 6px 18px rgba(20,30,40,0.06)}
    h1{margin-top:0;font-size:20px}
    label{display:block;margin:12px 0 6px;font-weight:600}
    input[type=text], input[type=email], input[type=tel], select, textarea {
      width:100%;padding:10px;border:1px solid #dfe4ea;border-radius:6px;box-sizing:border-box
    }
    .row{display:flex;gap:12px}
    .row .col{flex:1}
    .inline-note{font-size:13px;color:#555;margin-top:6px}
    .btn{background:#0074d9;color:#fff;padding:10px 14px;border-radius:6px;border:0;cursor:pointer}
    .small{font-size:13px;color:#666}
  </style>
</head>
<body>
  <div class="container">
    <h1>Free Practical Python Course — Registration</h1>
    <form id="registrationForm" method="post" action="/submit-registration">
      <label for="fullName">Full name</label>
      <input id="fullName" name="fullName" type="text" required />

      <div class="row">
        <div class="col">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />
        </div>
        <div class="col">
          <label for="phone">Phone (optional)</label>
          <input id="phone" name="phone" type="tel" />
        </div>
      </div>

      <label for="age">Age</label>
      <input id="age" name="age" type="text" inputmode="numeric" required />

      <label for="education">Current education level</label>
      <select id="education" name="education" required>
        <option value="">-- Select --</option>
        <option>High school (currently enrolled)</option>
        <option>1st year of college/university</option>
        <option>Other (not eligible for free seat)</option>
      </select>
      <div class="inline-note">Eligibility: currently enrolled in school or 1st-year college only — free seats reserved for those candidates.</div>

      <label for="institution">School / College name</label>
      <input id="institution" name="institution" type="text" required />

      <label for="city">City</label>
      <input id="city" name="city" type="text" required />

      <label for="experience">Prior programming experience (brief)</label>
      <textarea id="experience" name="experience" rows="3" placeholder="e.g., none / familiar with basics / some Python projects"></textarea>

      <label for="why">Why do you want to join? (optional)</label>
      <textarea id="why" name="why" rows="3"></textarea>

      <label>
        <input type="checkbox" name="agree" required /> I confirm that I'm currently enrolled in school or in 1st year of college and understand the free offer is for eligible candidates only.
      </label>

      <div style="margin-top:14px">
        <button class="btn" type="submit">Register</button>
        <span class="small" style="margin-left:12px">We'll contact eligible candidates via email.</span>
      </div>
    </form>
  </div>
</body>
</html>
