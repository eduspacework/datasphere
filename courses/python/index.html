<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Free Practical Python Course — Registration</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:0;padding:24px;background:#f6f8fa}
    .container{max-width:720px;margin:0 auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 6px 18px rgba(20,30,40,0.06)}
    h1{margin-top:0;font-size:20px}
    label{display:block;margin:12px 0 6px;font-weight:600}
    input[type=text], input[type=email], input[type=tel], select, textarea, input[type=file] {
      width:100%;padding:10px;border:1px solid #dfe4ea;border-radius:6px;box-sizing:border-box
    }
    .row{display:flex;gap:12px}
    .row .col{flex:1}
    .inline-note{font-size:13px;color:#555;margin-top:6px}
    .btn{background:#0074d9;color:#fff;padding:10px 14px;border-radius:6px;border:0;cursor:pointer}
    .btn:disabled{background:#999;cursor:not-allowed;}
    .small{font-size:13px;color:#666}

    /* Loader */
    #loadingOverlay{
      display:none;
      position:fixed;
      top:0;left:0;
      width:100%;height:100%;
      background:rgba(0,0,0,0.5);
      z-index:9999;
      align-items:center;
      justify-content:center;
    }
    .loader-box{
      background:#fff;
      padding:20px 30px;
      border-radius:8px;
      text-align:center;
      font-weight:600;
    }
    .spinner{
      width:30px;height:30px;
      border:4px solid #ccc;
      border-top:4px solid #0074d9;
      border-radius:50%;
      animation:spin 1s linear infinite;
      margin:12px auto 0;
    }
    @keyframes spin{ to{transform:rotate(360deg);} }
  </style>

  <link rel="icon" type="image/png" sizes="32x32" href="img/logos/dsa_favicon.png">
</head>
<body>

<div class="container">
  <h1>Free Practical Python Course — Registration</h1>

  <form id="applicationForm">
    <label>Full name</label>
    <input name="FullName" type="text" required />

    <div class="row">
      <div class="col">
        <label>Email</label>
        <input name="Email" type="email" required />
      </div>
      <div class="col">
        <label>Phone</label>
        <input name="Phone" type="tel" />
      </div>
    </div>

    <label>Age</label>
    <input name="Age" type="number" required />

    <label>Current education level</label>
    <select name="Education" required>
      <option value="">-- Select --</option>
      <option>High school (currently enrolled)</option>
      <option>College/University (currently enrolled)</option>
      <option>Others</option>
    </select>
    <div class="inline-note">Eligibility: currently enrolled in school or 1st-year college only — free seats reserved for those candidates.</div>


    <label>Institution</label>
    <input name="Institution" type="text" required />

    <label>City</label>
    <input name="City" type="text" required />

    <label>Prior programming experience (brief)</label>
    <!--<textarea name="Experience"></textarea>-->
    <textarea id="Experience" name="Experience" rows="3" placeholder="e.g., none / familiar with basics / some Python projects"></textarea>

    <label for="Why">Why do you want to join? (optional)</label>
    <textarea id="Why" name="Why" rows="3"></textarea>


    <label for="Proof">Proof of enrollment (optional)</label>
    <input id="Proof" name="Proof" type="file" accept=".pdf,image/*" />


    <label>
        <input type="checkbox" name="Eligibility" required /> I confirm that I'm currently enrolled in school or in 1st year of college and understand the free offer is for eligible candidates only.
    </label>

    <div style="margin-top:14px">
      <button class="btn" type="submit">Register</button>
    </div>
  </form>
</div>

<!-- Loader -->
<div id="loadingOverlay">
  <div class="loader-box">
    ⏳ Please wait...<br>
    Submitting your form...
    <div class="spinner"></div>
  </div>
</div>

<script src="pp.js"></script>

</body>
</html>
